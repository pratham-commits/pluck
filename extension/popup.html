<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Extractor</title>
  <style>
    /* ── CSS Variables ────────────────────────────────── */
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --surface-hover: #ebebeb;
      --border: #e0e0e0;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --accent-docx: #1D9E75;
      --accent-pptx: #D85A30;
      --accent-pdf: #378ADD;
      --danger: #E24B4A;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
      --transition: .2s cubic-bezier(.4,0,.2,1);
      --accent: var(--accent-pdf);
    }

    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 200px;
      max-height: 580px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      overflow-y: auto;
      overflow-x: hidden;
    }

    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Header ───────────────────────────────────────── */
    .header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .header-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent-docx), var(--accent-pdf));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 18px; height: 18px; }
    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.2px;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: .6px;
      font-weight: 500;
    }

    /* ── Drop Zone ────────────────────────────────────── */
    .dropzone-wrap { padding: 16px 20px; }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), transform var(--transition);
      position: relative;
    }
    .dropzone:hover {
      border-color: #bbb;
      background: var(--surface);
    }
    .dropzone.drag-over {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 6%, white);
      transform: scale(1.01);
    }
    .dropzone.has-error {
      border-color: var(--danger);
      background: color-mix(in srgb, var(--danger) 5%, white);
    }

    .dropzone-icon {
      width: 48px; height: 48px;
      margin: 0 auto 12px;
      background: var(--surface);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition);
    }
    .dropzone.drag-over .dropzone-icon {
      background: color-mix(in srgb, var(--accent) 12%, white);
    }
    .dropzone-icon svg { width: 22px; height: 22px; color: var(--text-secondary); }
    .dropzone.drag-over .dropzone-icon svg { color: var(--accent); }

    .dropzone-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .dropzone-sub {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .dropzone input[type="file"] { display: none; }

    /* ── Error State ──────────────────────────────────── */
    .error-box {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: color-mix(in srgb, var(--danger) 8%, white);
      border: 1px solid color-mix(in srgb, var(--danger) 20%, white);
      border-radius: var(--radius-sm);
      color: var(--danger);
      font-size: 12px;
      font-weight: 500;
      align-items: center;
      gap: 8px;
    }
    .error-box.visible { display: flex; }
    .error-box svg { flex-shrink: 0; width: 16px; height: 16px; }
    .error-box .retry-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--danger);
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
      text-decoration: underline;
      white-space: nowrap;
    }

    /* ── Status Bar ───────────────────────────────────── */
    .status-bar {
      display: none;
      padding: 10px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .status-bar.visible { display: flex; }

    .status-filename {
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .status-badge.docx {
      background: color-mix(in srgb, var(--accent-docx) 15%, white);
      color: var(--accent-docx);
    }
    .status-badge.pptx {
      background: color-mix(in srgb, var(--accent-pptx) 15%, white);
      color: var(--accent-pptx);
    }
    .status-badge.pdf {
      background: color-mix(in srgb, var(--accent-pdf) 15%, white);
      color: var(--accent-pdf);
    }
    .status-count {
      margin-left: auto;
      color: var(--text-secondary);
      font-size: 12px;
      white-space: nowrap;
    }

    /* ── Loading / Progress ───────────────────────────── */
    .progress-bar {
      display: none;
      padding: 14px 20px;
      text-align: center;
    }
    .progress-bar.visible { display: block; }

    .progress-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 10px;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-text {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ── Gallery Grid ─────────────────────────────────── */
    .gallery-wrap {
      display: none;
      padding: 12px 20px;
    }
    .gallery-wrap.visible { display: block; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .gallery-item {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: box-shadow var(--transition), border-color var(--transition);
      background: var(--surface);
    }
    .gallery-item:hover {
      box-shadow: var(--shadow-md);
      border-color: #ccc;
    }
    .gallery-item.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .gallery-thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }
    .gallery-video-placeholder {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
    }
    .gallery-video-placeholder svg {
      width: 32px; height: 32px;
      color: rgba(255,255,255,.7);
    }

    .gallery-name {
      padding: 5px 8px;
      font-size: 10px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .gallery-check {
      position: absolute;
      top: 6px; right: 6px;
      width: 20px; height: 20px;
      border-radius: 4px;
      border: 2px solid rgba(255,255,255,.8);
      background: rgba(0,0,0,.25);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), border-color var(--transition);
      backdrop-filter: blur(4px);
    }
    .gallery-item.selected .gallery-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .gallery-check svg {
      width: 12px; height: 12px;
      color: white;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .gallery-item.selected .gallery-check svg { opacity: 1; }

    /* ── No Media State ───────────────────────────────── */
    .no-media {
      display: none;
      padding: 24px 20px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .no-media.visible { display: block; }
    .no-media svg {
      width: 36px; height: 36px;
      color: var(--border);
      margin-bottom: 8px;
    }

    /* ── Action Bar ───────────────────────────────────── */
    .action-bar {
      display: none;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }
    .action-bar.visible { display: block; }

    .action-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .select-toggle {
      background: none;
      border: none;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }
    .select-toggle:hover { text-decoration: underline; }
    .select-count {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn svg { width: 14px; height: 14px; }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--surface-hover); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { opacity: .9; }

    /* ── Animations ───────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .gallery-item {
      animation: fadeInUp .3s ease both;
    }
    .gallery-item:nth-child(1) { animation-delay: .02s; }
    .gallery-item:nth-child(2) { animation-delay: .04s; }
    .gallery-item:nth-child(3) { animation-delay: .06s; }
    .gallery-item:nth-child(4) { animation-delay: .08s; }
    .gallery-item:nth-child(5) { animation-delay: .10s; }
    .gallery-item:nth-child(6) { animation-delay: .12s; }
    .gallery-item:nth-child(n+7) { animation-delay: .14s; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Media Extractor</h1>
      <p>DOCX · PPTX · PDF</p>
    </div>
  </div>

  <!-- Drop Zone -->
  <div class="dropzone-wrap">
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="dropzone-title">Drop your file here</div>
      <div class="dropzone-sub">or click to browse</div>
      <input type="file" id="fileInput" accept=".docx,.pptx,.pdf" />

      <div class="error-box" id="errorBox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span id="errorText">Something went wrong.</span>
        <button class="retry-btn" id="retryBtn">Retry</button>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <span class="status-filename" id="statusFilename"></span>
    <span class="status-badge" id="statusBadge"></span>
    <span class="status-count" id="statusCount"></span>
  </div>

  <!-- Progress / Loading -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-spinner"></div>
    <div class="progress-text" id="progressText">Extracting…</div>
  </div>

  <!-- No Media Found -->
  <div class="no-media" id="noMedia">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <div>No images or videos found in this file.</div>
  </div>

  <!-- Gallery -->
  <div class="gallery-wrap" id="galleryWrap">
    <div class="gallery" id="gallery"></div>
  </div>

  <!-- Action Bar -->
  <div class="action-bar" id="actionBar">
    <div class="action-top">
      <button class="select-toggle" id="selectToggle">Select all</button>
      <span class="select-count" id="selectCount">0 of 0 selected</span>
    </div>
    <div class="action-buttons">
      <button class="btn btn-secondary" id="btnDownloadSelected" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download selected
      </button>
      <button class="btn btn-primary" id="btnDownloadAll">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download all ZIP
      </button>
    </div>
  </div>

  <!-- Scripts (local bundles) -->
  <script src="libs/jszip.min.js"></script>
  <script src="libs/pdf.min.js"></script>
  <script src="libs/FileSaver.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
